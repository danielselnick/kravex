# kvx_file.toml — file-to-file mode.
# For when you want to migrate data without involving Elasticsearch.
# Benchmarking? Testing? Avoiding the cloud bill? We don't judge. 🚀
# "In a world where storage is cheap... one engineer still used files." — tagline, probably.
# 🦆

[runtime]
queue_capacity = 2
sink_parallelism = 1

[source.File]
file_name = "benchmark/rally-documents/noaa_documents.json"

[sink.File]
file_name = "output.json"

[throttle.source]
max_batch_size_bytes = 268435456
max_batch_size_docs = 100000

[throttle.sink]
max_request_size_bytes = 268435456
