# kvx_file_to_esdb.toml — file source, Elasticsearch sink.
# The benchmark config. The one that makes graphs go up.
# NOAA weather data into Elasticsearch because weather is a solved problem
# and yet somehow still unpredictable. Like this codebase. 🌩️
# 🦆

[runtime]
queue_capacity = 10
sink_parallelism = 5

[source.File]
file_name = "benchmark/rally-documents/noaa_documents.json"

[sink.Elasticsearch]
url = "http://localhost:9200"
index = "test-123"

[throttle.source]
max_batch_size_bytes = 131072
max_batch_size_docs = 10000

[throttle.sink]
max_request_size_bytes = 131072
